name: pixel_aup_events
description: "Flutter Event Attendance Management App with QR Code Scanning"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # UI - Icons & Typography
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  icons_plus: ^5.0.0
  phosphor_flutter: ^2.0.0
  
  # Theming
  flex_color_scheme: ^8.4.0
  
  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  
  # Modern UI Effects
  glassmorphism: ^3.0.0
  blur: ^4.0.0
  
  # Event / Ticket UI
  dotted_border: ^2.1.0
  ticket_widget: ^1.0.1
  
  # Navigation
  go_router: ^14.0.0
  
  # Notifications
  top_snackbar_flutter: ^3.1.0
  
  # Media
  cached_network_image: ^3.3.1
  photo_view: ^0.15.0
  
  # Tables (Admin)
  data_table_2: ^2.5.0
  
  # State Management
  flutter_riverpod: ^2.6.1
  
  # Network
  dio: ^5.7.0
  connectivity_plus: ^6.1.2
  
  # Storage
  flutter_secure_storage: ^10.0.0
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.4
  
  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0

  # WebView (for external game activities)
  webview_flutter: ^4.10.0
  
  # Excel Export
  excel: ^4.0.6
  
  # PDF Generation
  pdf: ^3.11.1
  printing: ^5.13.4
  
  # Utilities
  intl: ^0.20.2
  crypto: ^3.0.6
  jwt_decoder: ^2.0.1
  audioplayers: ^6.1.0
  vibration: ^2.0.0
  share_plus: ^10.1.4
  permission_handler: ^11.3.1
  
  # Charts for Analytics
  fl_chart: ^0.70.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # App Icon & Splash Screen
  flutter_launcher_icons: ^0.14.2
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/

# App Icon Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.jpg"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_icon.jpg"

# Splash Screen Configuration
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/splash_icon.jpg
  android: true
  ios: true
  web: false
